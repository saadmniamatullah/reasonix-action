name: Reasonix Agent
on:
  workflow_call:
    inputs:
      issue-number:
        required: true
        type: number
      issue-title:
        required: true
        type: string
      issue-body:
        required: true
        type: string
      comment-id:
        required: true
        type: number
      comment-body:
        required: true
        type: string
      is-pr:
        required: false
        type: boolean
        default: false
      pr-branch:
        required: false
        type: string
        default: ""
    secrets:
      DEEPSEEK_API_KEY:
        required: true

jobs:
  reasonix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.is-pr && inputs.pr-branch || '' }}

      - name: Add eyes reaction
        run: gh api repos/${{ github.repository }}/issues/comments/${{ inputs.comment-id }}/reactions -f content='eyes'
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Run reasonix
        run: npx reasonix@next run "$PROMPT" --budget 2.00 --no-session
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PROMPT: |
            You are working on this repository. Read the issue/PR below and implement the requested changes.
            Make small, focused commits with clear messages.

            After making changes, write a PR description to `pr-body.md` summarizing:
            - What was changed
            - Why it was changed
            - Any important implementation details

            Issue #${{ inputs.issue-number }}: ${{ inputs.issue-title }}

            ${{ inputs.issue-body }}

            Instructions from commenter:
            ${{ inputs.comment-body }}

      - name: Create Pull Request
        if: ${{ !inputs.is-pr }}
        uses: peter-evans/create-pull-request@v8
        with:
          branch: reasonix/issue-${{ inputs.issue-number }}
          commit-message: "fix: resolve #${{ inputs.issue-number }}"
          title: "fix: resolve #${{ inputs.issue-number }}"
          body-file: pr-body.md

      - name: Push to PR branch
        if: ${{ inputs.is-pr }}
        run: git push origin HEAD:${{ inputs.pr-branch }}
        env:
          GH_TOKEN: ${{ github.token }}

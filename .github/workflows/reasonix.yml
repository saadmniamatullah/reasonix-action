name: Reasonix Agent
on:
  workflow_call:
    inputs:
      issue-number:
        required: true
        type: number
      issue-title:
        required: true
        type: string
      issue-body:
        required: true
        type: string
      comment-id:
        required: false
        type: number
        default: 0
      comment-body:
        required: false
        type: string
        default: ""
      is-pr:
        required: false
        type: boolean
        default: false
      pr-branch:
        required: false
        type: string
        default: ""
    secrets:
      DEEPSEEK_API_KEY:
        required: true

jobs:
  reasonix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.is-pr && inputs.pr-branch || '' }}

      - name: Add eyes reaction
        if: inputs.comment-id != 0
        run: gh api repos/${{ github.repository }}/issues/comments/${{ inputs.comment-id }}/reactions -f content='eyes'
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Resolve Node.js version
        id: node-version
        run: |
          for f in .node-version .nvmrc; do
            if [ -f "$f" ]; then
              echo "version=$(tr -d '[:space:]' < "$f")" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "version=24" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.node-version.outputs.version }}

      - name: Configure Git
        run: |
          git config user.name "reasonix[bot]"
          git config user.email "reasonix[bot]@users.noreply.github.com"

      - name: Configure reasonix credentials
        run: |
          mkdir -p ~/.reasonix
          echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" > ~/.reasonix/.env

      - name: Run reasonix
        run: npx reasonix@next run "$PROMPT" --budget 2.00 --no-session
        env:
          PROMPT: |
            You are working on this repository. Read the issue/PR below and implement the requested changes.
            Make small, focused commits with clear messages.

            After making changes, write a PR description to `pr-body.md` summarizing:
            - What was changed
            - Why it was changed
            - Any important implementation details

            Issue #${{ inputs.issue-number }}: ${{ inputs.issue-title }}

            ${{ inputs.issue-body }}

            Instructions from commenter:
            ${{ inputs.comment-body }}

      - name: Create Pull Request
        if: ${{ !inputs.is-pr }}
        uses: peter-evans/create-pull-request@v8
        with:
          branch: reasonix/issue-${{ inputs.issue-number }}
          commit-message: "fix: resolve #${{ inputs.issue-number }}"
          title: "fix: resolve #${{ inputs.issue-number }}"
          body-file: pr-body.md

      - name: Push to PR branch
        if: ${{ inputs.is-pr }}
        run: git push origin HEAD:${{ inputs.pr-branch }}
        env:
          GH_TOKEN: ${{ github.token }}

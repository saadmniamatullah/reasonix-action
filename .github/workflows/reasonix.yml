name: Reasonix Agent
on:
  workflow_call:
    inputs:
      issue-number:
        required: true
        type: number
      issue-title:
        required: true
        type: string
      issue-body:
        required: true
        type: string
      comment-body:
        required: true
        type: string
    secrets:
      DEEPSEEK_API_KEY:
        required: true

jobs:
  reasonix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: npm i -g reasonix@next

      - name: Run reasonix
        run: reasonix run "$PROMPT" --budget 2.00 --no-session
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PROMPT: |
            You are working on this repository. Read the issue below and implement the fix.
            Make small, focused commits with clear messages.

            Issue #${{ inputs.issue-number }}: ${{ inputs.issue-title }}

            ${{ inputs.issue-body }}

            Instructions from commenter:
            ${{ inputs.comment-body }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: reasonix/issue-${{ inputs.issue-number }}
          commit-message: "fix: resolve #${{ inputs.issue-number }}"
          title: "fix: resolve #${{ inputs.issue-number }}"
          body: |
            Automated fix for #${{ inputs.issue-number }}

            Fixes #${{ inputs.issue-number }}

            ---
            _Generated by [Reasonix](https://reasonix.io) agent_
